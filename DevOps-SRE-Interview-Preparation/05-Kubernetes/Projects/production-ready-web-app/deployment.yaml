apiVersion: apps/v1
kind: Deployment
metadata:
  name: health-web
  namespace: interview-k8s
  labels:
    app.kubernetes.io/name: health-web
    app.kubernetes.io/part-of: kubernetes-interview-preparation
spec:
  replicas: 2
  revisionHistoryLimit: 5
  progressDeadlineSeconds: 120
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: health-web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: health-web
        app.kubernetes.io/part-of: kubernetes-interview-preparation
    spec:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
        fsGroup: 101
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: web
          image: nginx:1.28-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            failureThreshold: 12
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 5"]
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
              readOnly: true
            - name: web-content
              mountPath: /usr/share/nginx/html
              readOnly: true
            - name: runtime
              mountPath: /tmp
      volumes:
        - name: nginx-config
          configMap:
            name: health-web-content
            items:
              - key: nginx.conf
                path: nginx.conf
        - name: web-content
          configMap:
            name: health-web-content
            items:
              - key: index.html
                path: index.html
        - name: runtime
          emptyDir:
            sizeLimit: 32Mi
