apiVersion: v1
kind: ConfigMap
metadata:
  name: health-web-content
  namespace: interview-k8s
  labels:
    app.kubernetes.io/name: health-web
data:
  nginx.conf: |
    pid /tmp/nginx.pid;
    error_log /dev/stderr notice;
    events {}
    http {
      access_log /dev/stdout;
      client_body_temp_path /tmp/client_temp;
      proxy_temp_path /tmp/proxy_temp;
      fastcgi_temp_path /tmp/fastcgi_temp;
      uwsgi_temp_path /tmp/uwsgi_temp;
      scgi_temp_path /tmp/scgi_temp;
      server {
        listen 8080;
        server_name _;
        root /usr/share/nginx/html;
        location = /healthz {
          access_log off;
          add_header Content-Type text/plain;
          return 200 'healthy\n';
        }
        location = /readyz {
          access_log off;
          add_header Content-Type text/plain;
          return 200 'ready\n';
        }
        location / {
          try_files $uri $uri/ /index.html;
        }
      }
    }
  index.html: |
    <!doctype html>
    <html lang="en">
      <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width,initial-scale=1">
        <title>Kubernetes Interview Project</title>
        <style>
          body{font-family:system-ui;background:#0f172a;color:#e2e8f0;display:grid;place-items:center;min-height:100vh;margin:0}
          main{max-width:720px;padding:3rem;border:1px solid #334155;border-radius:18px;background:#111827}
          h1{color:#60a5fa} code{color:#86efac}
        </style>
      </head>
      <body>
        <main>
          <h1>Kubernetes Health Web</h1>
          <p>The production-minded interview project is running.</p>
          <p>Health: <code>/healthz</code> · Readiness: <code>/readyz</code></p>
        </main>
      </body>
    </html>
